name: Keep Render Alive

on:
  schedule:
    # Runs every 10 minutes — Render free tier spins down after 15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Backend Health
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health endpoint
        run: |
          echo "Pinging backend at ${{ secrets.RENDER_BACKEND_URL }}/health ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ secrets.RENDER_BACKEND_URL }}/health")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo " Backend is alive (HTTP $STATUS)"
          else
            echo " Backend returned HTTP $STATUS — may still be waking up"
          fi
